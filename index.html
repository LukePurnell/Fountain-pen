/* ── Detect share hash on page load ── */
async function checkShareHash() {
  const hash = window.location.hash;
  if (!hash.startsWith('#s=')) return;

  // Show loading overlay while decoding
  const overlay = document.createElement('div');
  overlay.className = 'generating-overlay';
  overlay.innerHTML = '<div class="generating-spinner"></div><div style="font-size:13px;color:var(--muted)">Opening screenplay…</div>';
  document.body.appendChild(overlay);

  try {
    const text = await decodeShareHash(hash);
    document.body.removeChild(overlay);

    if (!text) { showToast('Invalid share link'); return; }

    const parsed = parseFountain(text);
    const title = (parsed.titlePage && parsed.titlePage.title) ? parsed.titlePage.title : 'Shared Screenplay';
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    const pages = paginateTokens(parsed.body).length;
    const url = window.location.href;

    // Re-encode for the share button (URL is already the share URL)
    shareViewerUrl = url;
    openShareViewer(text, title, words, pages, url);
  } catch(e) {
    if (document.body.contains(overlay)) document.body.removeChild(overlay);
    showToast('Could not open share link');
    console.error(e);
  }
}


/* ═══════════════════════════════════════════════════════════════
   GOOGLE DRIVE SYNC — Shared Client ID / PKCE OAuth
   ───────────────────────────────────────────────────────────────
   One Client ID is hardcoded by the app owner (you).
   Everyone else just sees "Sign in with Google" — no setup.
   Uses OAuth 2.0 PKCE so no client secret is needed.
   Scope: drive.file — can only see files this app created.
   ═══════════════════════════════════════════════════════════════ */

/* ── !! OWNER SETUP: paste your OAuth Client ID here !! ──────────
   1. console.cloud.google.com → New Project → "Fountain Pen"
   2. APIs & Services → Enable → Google Drive API
   3. APIs & Services → Credentials → Create OAuth Client ID
      Type: Web application
      Authorised JavaScript origins: https://YOUR-USERNAME.github.io
      Authorised redirect URIs:      https://YOUR-USERNAME.github.io/fountain-pen/
   4. Copy the Client ID and paste it below.
   Once done, everyone who uses the app just clicks "Sign in with Google".
   ──────────────────────────────────────────────────────────────── */
const DRIVE_CLIENT_ID = 'YOUR_CLIENT_ID_HERE.apps.googleusercontent.com';

const DRIVE_PREFS_KEY  = 'fountain-pen-drive-v1';
const DRIVE_TOKEN_KEY  = 'fountain-pen-drive-token-v1';
const DRIVE_FILES_KEY  = 'fountain-pen-drive-files-v1';
const DRIVE_SCOPE      = 'https://www.googleapis.com/auth/drive.file';
const DRIVE_REDIRECT   = window.location.origin + window.location.pathname;

let driveToken   = null;   // { access_token, refresh_token, expires_at, user_email }
let drivePrefs   = null;   // { folderId, folderName, enabled }
let driveSaveTimer  = null;
let driveIsSyncing  = false;

/* ── Storage helpers ── */
function loadDrivePrefs()  { try { return JSON.parse(localStorage.getItem(DRIVE_PREFS_KEY))  || {}; } catch { return {}; } }
function saveDrivePrefs(p) { drivePrefs = p; try { localStorage.setItem(DRIVE_PREFS_KEY,  JSON.stringify(p)); } catch(e) {} }
function loadDriveToken()  {
  try {
    const t = JSON.parse(localStorage.getItem(DRIVE_TOKEN_KEY));
    return (t && t.expires_at > Date.now()) ? t : null;
  } catch { return null; }
}
function saveDriveToken(t) { driveToken = t; try { localStorage.setItem(DRIVE_TOKEN_KEY, JSON.stringify(t)); } catch(e) {} }
function clearDriveToken() { driveToken = null; try { localStorage.removeItem(DRIVE_TOKEN_KEY); } catch(e) {} }
function getDriveFileMap() { try { return JSON.parse(localStorage.getItem(DRIVE_FILES_KEY)) || {}; } catch { return {}; } }
function setDriveFileMap(m){ try { localStorage.setItem(DRIVE_FILES_KEY, JSON.stringify(m)); } catch(e) {} }

/* ── PKCE helpers ── */
async function generatePKCE() {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  const verifier = btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  const challenge = btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  return { verifier, challenge };
}

function isDriveConfigured() {
  return DRIVE_CLIENT_ID && !DRIVE_CLIENT_ID.startsWith('YOUR_CLIENT_ID');
}

/* ── OAuth flow ── */
async function startSignIn() {
  if (!isDriveConfigured()) {
    showModal(`
      <h3>Drive Not Configured</h3>
      <p style="font-size:12px;color:var(--muted)">The app owner needs to add a Google OAuth Client ID to enable Drive sync. If you're the owner, open <code>index.html</code>, find <code>DRIVE_CLIENT_ID</code> near the top of the Drive section, and replace the placeholder with your real Client ID.</p>
      <div class="modal-buttons"><button class="modal-btn primary" onclick="closeModal()">OK</button></div>
    `);
    return;
  }
  const { verifier, challenge } = await generatePKCE();
  try {
    sessionStorage.setItem('drive_pkce_verifier', verifier);
  } catch(e) {}
  const params = new URLSearchParams({
    client_id: DRIVE_CLIENT_ID,
    redirect_uri: DRIVE_REDIRECT,
    response_type: 'code',
    scope: DRIVE_SCOPE,
    code_challenge: challenge,
    code_challenge_method: 'S256',
    access_type: 'offline',
    prompt: 'consent',
    state: 'drive_auth'
  });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
}

async function exchangeCode(code, verifier) {
  const resp = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      code, client_id: DRIVE_CLIENT_ID,
      redirect_uri: DRIVE_REDIRECT,
      grant_type: 'authorization_code',
      code_verifier: verifier
    })
  });
  if (!resp.ok) throw new Error('Token exchange failed');
  return resp.json();
}

async function refreshToken() {
  if (!driveToken || !driveToken.refresh_token) throw new Error('No refresh token');
  const resp = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id: DRIVE_CLIENT_ID,
      grant_type: 'refresh_token',
      refresh_token: driveToken.refresh_token
    })
  });
  if (!resp.ok) throw new Error('Refresh failed');
  const t = await resp.json();
  driveToken.access_token = t.access_token;
  driveToken.expires_at = Date.now() + t.expires_in * 1000;
  saveDriveToken(driveToken);
  return driveToken.access_token;
}

async function getAccessToken() {
  if (!driveToken) throw new Error('Not signed in');
  if (driveToken.expires_at > Date.now() + 60000) return driveToken.access_token;
  return refreshToken();
}

async function driveAPI(method, path, body) {
  const token = await getAccessToken();
  const headers = { Authorization: 'Bearer ' + token };
  if (body && !(body instanceof FormData)) headers['Content-Type'] = 'application/json';
  const resp = await fetch('https://www.googleapis.com/drive/v3/' + path, {
    method, headers,
    body: body ? (body instanceof FormData ? body : JSON.stringify(body)) : undefined
  });
  if (!resp.ok) throw new Error('Drive API ' + resp.status + ': ' + await resp.text());
  const ct = resp.headers.get('content-type') || '';
  return ct.includes('json') ? resp.json() : resp.text();
}

/* ── Drive file operations ── */
async function ensureFolder() {
  if (drivePrefs.folderId) return drivePrefs.folderId;
  const name = 'Fountain Pen';
  const q = encodeURIComponent(`name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const res = await driveAPI('GET', `files?q=${q}&fields=files(id)`);
  if (res.files && res.files.length) {
    saveDrivePrefs({ ...drivePrefs, folderId: res.files[0].id, folderName: name });
    return res.files[0].id;
  }
  const folder = await driveAPI('POST', 'files', { name, mimeType: 'application/vnd.google-apps.folder' });
  saveDrivePrefs({ ...drivePrefs, folderId: folder.id, folderName: name });
  return folder.id;
}

async function saveToDrive(docId, title, text) {
  const folderId = await ensureFolder();
  const fileMap = getDriveFileMap();
  const filename = title.replace(/[/\\?%*:|"<>]/g, '-').replace(/\s+/g, '_').slice(0, 80) + '.fountain';
  const blob = new Blob([text], { type: 'text/plain' });
  const token = await getAccessToken();

  if (fileMap[docId]) {
    // Update existing
    const r = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileMap[docId]}?uploadType=media`, {
      method: 'PATCH', headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'text/plain' }, body: blob
    });
    if (!r.ok) { delete fileMap[docId]; setDriveFileMap(fileMap); return saveToDrive(docId, title, text); }
    await driveAPI('PATCH', `files/${fileMap[docId]}?fields=id`, { name: filename });
    return fileMap[docId];
  }
  // Create new
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify({ name: filename, parents: [folderId] })], { type: 'application/json' }));
  form.append('file', blob);
  const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
    method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: form
  });
  if (!r.ok) throw new Error('Upload failed');
  const data = await r.json();
  fileMap[docId] = data.id;
  setDriveFileMap(fileMap);
  return data.id;
}

async function listDriveFiles() {
  const folderId = await ensureFolder();
  const q = encodeURIComponent(`'${folderId}' in parents and trashed=false and name contains '.fountain'`);
  const res = await driveAPI('GET', `files?q=${q}&fields=files(id,name,modifiedTime)&orderBy=modifiedTime+desc`);
  return res.files || [];
}

/* ── Status bar ── */
function updateDriveStatusBar() {
  const bar  = document.getElementById('driveStatusBar');
  const dot  = document.getElementById('driveDot');
  const text = document.getElementById('driveStatusText');
  if (!driveToken || !drivePrefs || !drivePrefs.enabled) { bar.classList.remove('show'); return; }
  bar.classList.add('show');
  if (driveIsSyncing) {
    dot.className = 'dot syncing';
    text.textContent = 'Saving to Drive…';
  } else {
    dot.className = 'dot';
    text.textContent = (driveToken.user_email || 'Google Drive') + ' · synced';
  }
}
document.getElementById('driveStatusManage').addEventListener('click', openDriveModal);

/* ── Autosave scheduler ── */
function scheduleDriveSave() {
  if (!driveToken || !drivePrefs || !drivePrefs.enabled) return;
  clearTimeout(driveSaveTimer);
  driveSaveTimer = setTimeout(async () => {
    if (!currentDocId) return;
    const text = editor.value;
    if (!text.trim()) return;
    const parsed = parseFountain(text);
    const title = (parsed.titlePage && parsed.titlePage.title) ? parsed.titlePage.title : 'Untitled';
    driveIsSyncing = true; updateDriveStatusBar();
    try { await saveToDrive(currentDocId, title, text); }
    catch(e) {
      console.warn('Drive autosave failed:', e.message);
      document.getElementById('driveDot').className = 'dot error';
      document.getElementById('driveStatusText').textContent = 'Sync failed — tap to reconnect';
    }
    driveIsSyncing = false; updateDriveStatusBar();
  }, 3000);
}

/* ── Modals ── */
async function openDriveModal() {
  closeDrawer();
  drivePrefs = loadDrivePrefs();
  driveToken = loadDriveToken();
  if (driveToken && drivePrefs.enabled) showDriveConnectedModal();
  else showDriveSignInModal();
}

function showDriveSignInModal() {
  const configured = isDriveConfigured();
  showModal(`
    <h3>Google Drive Sync</h3>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px">
      Sign in with Google to automatically back up every screenplay as a <code>.fountain</code> file in your Drive.
      The app can only see files it creates — not the rest of your Drive.
    </p>
    ${!configured ? `<div style="background:#3a1a1a;border:1px solid var(--danger);border-radius:6px;padding:10px;margin-bottom:12px;font-size:11px;color:#e8a090">
      ⚠ Drive sync is not yet configured by the app owner.
      If you own this app, see the <code>DRIVE_CLIENT_ID</code> comment in <code>index.html</code>.
    </div>` : ''}
    <div style="text-align:center;padding:8px 0">
      <button class="modal-btn primary" id="signInBtn" style="padding:12px 24px;font-size:14px;letter-spacing:1px;${!configured?'opacity:0.4;pointer-events:none':''}" ${!configured?'disabled':''}>
        Sign in with Google
      </button>
    </div>
    <p style="font-size:10px;color:var(--muted);text-align:center;margin-top:12px">
      Your screenplays are saved to a "Fountain Pen" folder in your Drive.<br>
      Each person's Drive is completely separate.
    </p>
    <div class="modal-buttons"><button class="modal-btn" onclick="closeModal()">Cancel</button></div>
  `);
  if (configured) {

  }
}

async function showDriveConnectedModal() {
  let files = [], listError = null;
  try { files = await listDriveFiles(); } catch(e) { listError = e.message; }

  const filesHtml = listError
    ? `<p style="color:var(--danger);font-size:11px">${escapeHtml(listError)}</p>`
    : files.length === 0
      ? '<p style="color:var(--muted);font-size:12px">No files yet — they appear after the first autosave.</p>'
      : files.slice(0,15).map(f => `
          <div class="drive-doc-row">
            <div class="drive-doc-name">${escapeHtml(f.name.replace(/\.fountain$/i,''))}</div>
            <div class="drive-doc-meta">${f.modifiedTime ? new Date(f.modifiedTime).toLocaleDateString() : ''}</div>
            <button class="doc-action-btn" style="font-size:10px;margin-left:8px" onclick="importFromDrive('${f.id}','${escapeHtml(f.name)}')">Open</button>
          </div>`).join('');

  showModal(`
    <h3>Google Drive Sync</h3>
    <div class="drive-connected-info">
      <div class="drive-email">✓ Signed in as ${escapeHtml(driveToken.user_email || 'Google Account')}</div>
      <div class="drive-folder">Folder: ${escapeHtml(drivePrefs.folderName || 'Fountain Pen')} · Autosave ON</div>
    </div>
    <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px">Files in Drive</div>
    <div style="max-height:35vh;overflow-y:auto">${filesHtml}</div>
    <div class="modal-buttons" style="flex-wrap:wrap">
      <button class="modal-btn" id="driveSyncNowBtn">Sync Now</button>
      <button class="modal-btn danger" id="driveSignOutBtn" style="color:var(--danger)">Sign Out</button>
      <button class="modal-btn primary" onclick="closeModal()">Done</button>
    </div>
  `);

  document.getElementById('driveSyncNowBtn').addEventListener('click', async () => {
    closeModal();
    const text = editor.value;
    if (!text.trim()) { showToast('Nothing to sync'); return; }
    const parsed = parseFountain(text);
    const title = (parsed.titlePage && parsed.titlePage.title) ? parsed.titlePage.title : 'Untitled';
    driveIsSyncing = true; updateDriveStatusBar();
    try { await saveToDrive(currentDocId, title, text); showToast('Saved to Drive ✓'); }
    catch(e) { showToast('Sync failed: ' + e.message); }
    driveIsSyncing = false; updateDriveStatusBar();
  });

  document.getElementById('driveSignOutBtn').addEventListener('click', () => {
    if (!confirm('Sign out of Google Drive? Your files in Drive will not be deleted.')) return;
    clearDriveToken(); saveDrivePrefs({});
    try { localStorage.removeItem(DRIVE_FILES_KEY); } catch(e) {}
    closeModal(); updateDriveStatusBar(); showToast('Signed out of Drive');
  });
}

window.importFromDrive = async function(fileId, filename) {
  closeModal();
  try {
    const token = await getAccessToken();
    const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!resp.ok) throw new Error('Download failed');
    const text = await resp.text();
    if (currentDocId) saveDocText(currentDocId, editor.value);
    const newId = genId();
    const title = filename.replace(/\.fountain$/i,'').replace(/_/g,' ');
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    const idx = getDocsIndex();
    idx.unshift({ id: newId, title, words, updated: 'From Drive', created: new Date().toLocaleString() });
    setDocsIndex(idx);
    saveDocText(newId, text);
    const fileMap = getDriveFileMap();
    fileMap[newId] = fileId;
    setDriveFileMap(fileMap);
    currentDocId = newId; setCurrentDocId(newId);
    editor.value = text;
    afterEdit(); refreshDictionary();
    showToast('Imported: ' + title);
  } catch(e) { showToast('Import failed: ' + e.message); }
};

/* ── OAuth callback (called on page load after redirect) ── */
async function handleOAuthCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (!code || params.get('state') !== 'drive_auth') return false;

  history.replaceState(null, '', window.location.pathname + window.location.hash);

  const verifier = sessionStorage.getItem('drive_pkce_verifier');
  sessionStorage.removeItem('drive_pkce_verifier');
  if (!verifier) { showToast('Sign-in failed — please try again'); return true; }

  const overlay = document.createElement('div');
  overlay.className = 'generating-overlay';
  overlay.innerHTML = '<div class="generating-spinner"></div><div style="font-size:13px;color:var(--muted)">Connecting to Google Drive…</div>';
  document.body.appendChild(overlay);

  try {
    const tokenData = await exchangeCode(code, verifier);
    // Get user email
    const infoResp = await fetch('https://www.googleapis.com/oauth2/v1/userinfo?alt=json', {
      headers: { Authorization: 'Bearer ' + tokenData.access_token }
    });
    const userInfo = infoResp.ok ? await infoResp.json() : {};

    saveDriveToken({
      access_token:  tokenData.access_token,
      refresh_token: tokenData.refresh_token,
      expires_at:    Date.now() + tokenData.expires_in * 1000,
      user_email:    userInfo.email || ''
    });
    saveDrivePrefs({ ...loadDrivePrefs(), enabled: true });
    document.body.removeChild(overlay);

    // Create folder immediately so it's ready
    await ensureFolder();
    updateDriveStatusBar();
    showToast('Google Drive connected!');
    setTimeout(showDriveConnectedModal, 400);
  } catch(e) {
    document.body.removeChild(overlay);
    showToast('Sign-in failed: ' + e.message);
    console.error(e);
  }
  return true;
}

document.getElementById('driveBtn').addEventListener('click', openDriveModal);

/* ── Wire into scheduleSave ── */
function triggerDriveAutosave() {
  if (driveToken && drivePrefs && drivePrefs.enabled) scheduleDriveSave();
}

function applyPipMode() {

    if (spw) spw.classList.remove('pip-mode');

pipToggle.addEventListener('click', () => {

  prefs.pip = !prefs.pip;
  savePrefs();
  syncPipToggle();

  const previewTab = document.querySelector('.tab[data-panel="preview-panel"]');
  if (previewTab && !previewTab.classList.contains('active')) {
    previewTab.click();
  }
  showToast(prefs.pip ? 'Pip mode on' : 'Pip mode off');
});

/* INIT */
(async function init() {
  // ── Migrate legacy single-doc storage ──────────────────────────
  const LEGACY_KEY = 'fountain-pen-document-v1';
  const legacy = localStorage.getItem(LEGACY_KEY);

  let idx = getDocsIndex();

  if (legacy !== null && idx.length === 0) {
    // Migrate: wrap legacy text into the new doc system
    const id = genId();
    const parsed = parseFountain(legacy);
    const title = (parsed.titlePage && parsed.titlePage.title) ? parsed.titlePage.title : 'Untitled';
    const words = legacy.trim() ? legacy.trim().split(/\s+/).length : 0;
    idx = [{ id, title, words, updated: 'Migrated', created: new Date().toLocaleString() }];
    setDocsIndex(idx);
    saveDocText(id, legacy);
    setCurrentDocId(id);
    try { localStorage.removeItem(LEGACY_KEY); } catch(e) {}
  }

  if (idx.length === 0) {
    // Fresh install — create first doc
    const id = genId();
    idx = [{ id, title: 'Untitled Screenplay', words: 0, updated: 'Just now', created: new Date().toLocaleString() }];
    setDocsIndex(idx);
    saveDocText(id, TEMPLATE);
    setCurrentDocId(id);
  }

  // Load current doc (fall back to most recent if current not found)
  currentDocId = getCurrentDocId();
  if (!currentDocId || !getDocMeta(currentDocId)) {
    currentDocId = idx[0].id;
    setCurrentDocId(currentDocId);
  }

  editor.value = loadDocText(currentDocId) || TEMPLATE;

  document.body.classList.add('editor-active');
  refreshDictionary();
  updateStats();
  updateSmartBar();
  renderPreview();
  syncHlToggle();
  syncPipToggle();
  applyPipMode();
  checkStorageHealth();
  if (prefs.highlight) enableHighlight();
  else disableHighlight();
  // Init Drive (load prefs, show status bar)
  drivePrefs = loadDrivePrefs();
  updateDriveStatusBar();
  // Handle OAuth redirect (must run before checkShareHash)
  const wasOAuthRedirect = await handleOAuthCallback();
  if (!wasOAuthRedirect) checkShareHash();
})();

document.body.addEventListener('touchmove', (e) => {
  if (e.target === document.body) e.preventDefault();
}, { passive: false });

/* ── PWA: Register Service Worker for offline support ── */
if ('serviceWorker' in navigator) {
  // Inline SW as a blob so it works from a local file
  const swCode = `
    const CACHE = 'fountain-pen-v1';
    const ASSETS = [
      'https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:wght@500;600&display=swap',
      'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'
    ];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS).catch(()=>{})));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          if (res && res.status === 200 && e.request.url.startsWith('http')) {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
          }
          return res;
        }).catch(() => caches.match(e.request)))
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, { scope: '/' }).catch(() => {});
}
