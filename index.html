<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a1a">
<title>Fountain — Screenplay Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Fountain+Pen%22%2C%22short_name%22%3A%22Fountain%22%2C%22description%22%3A%22Screenplay+editor+for+writers%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231a1a1a%22%2C%22theme_color%22%3A%22%231a1a1a%22%2C%22orientation%22%3A%22portrait%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg+xmlns%3D%2527http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%2527+viewBox%3D%270+0+512+512%2527%253E%253Crect+width%3D%2527512%2527+height%3D%2527512%2527+rx%3D%252780%2527+fill%3D%2527%25231a1a1a%2527%2F%253E%253Ctext+x%3D%2527256%2527+y%3D%2527340%2527+font-size%3D%2527320%2527+text-anchor%3D%2527middle%2527+fill%3D%2527%2523d4a574%2527+font-family%3D%2527serif%2527%253EF%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%231a1a1a'/><text x='256' y='340' font-size='320' text-anchor='middle' fill='%23d4a574' font-family='Georgia,serif'>F</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #1a1a1a; --bg-elev: #232323; --bg-paper: #f4ecd8; --ink: #2a2620;
    --rule: #3a3a3a; --muted: #8a8a8a; --accent: #d4a574; --accent-dim: #8b6f4e;
    --text: #e8e4dc; --danger: #c97064; --shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  /* ── Root: body is a vertical flex column filling the screen ── */
  html { height: 100%; }
  body {
    margin: 0; padding: 0;
    height: 100%;
    /* Use dvh via min/max-height so the body truly fills dynamic viewport */
    min-height: 100dvh; max-height: 100dvh;
    display: flex; flex-direction: column;
    overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: 'Courier Prime', 'Courier New', monospace;
    -webkit-font-smoothing: antialiased; overscroll-behavior: none;
  }

  /* ── Chrome (header + tabs): always visible, never flex-shrinks ── */
  header {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 12px; padding-top: max(5px, env(safe-area-inset-top));
    background: var(--bg); border-bottom: 1px solid var(--rule);
    z-index: 5;
  }
  .brand { font-family: 'Cormorant Garamond', serif; font-size: 15px; letter-spacing: 0.5px; font-weight: 600; }
  .brand .dot { color: var(--accent); margin: 0 3px; }
  .menu-btn {
    background: none; border: 1px solid var(--rule); color: var(--text);
    width: 28px; height: 28px; border-radius: 5px; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .menu-btn:active { background: var(--bg-elev); }
  .tabs { flex: 0 0 auto; display: flex; background: var(--bg); border-bottom: 1px solid var(--rule); }
  .tab {
    flex: 1; padding: 7px 12px; text-align: center; background: none; border: none;
    color: var(--muted); font-family: 'Cormorant Garamond', serif; font-size: 13px;
    letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
    border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── The two bars live here on body, always in flow, never hidden ── */
  /* They are shown only when the editor panel is active (JS toggles .bars-visible on body) */
  .editor-bars { flex: 0 0 auto; display: none; flex-direction: column; }
  body.editor-active .editor-bars { display: flex; }

  /* ── main: fills ALL remaining space (between chrome+bars and keyboard) ── */
  main { flex: 1 1 0; min-height: 0; position: relative; overflow: hidden; }

  /* panels fill main absolutely — only content scrolls here */
  .panel { position: absolute; inset: 0; display: none; overflow: hidden; }
  .panel.active { display: flex; flex-direction: column; }


  /* ── Syntax highlight overlay ───────────────────────────────────────────── */
  #highlight-layer {
    /* Sits ABOVE the textarea, pointer-events off so editor still receives all input */
    position: absolute; inset: 0;
    padding: 16px;
    font-family: 'Courier Prime', 'Courier New', monospace;
    font-size: 15px; line-height: 1.6;
    white-space: pre-wrap; word-wrap: break-word;
    overflow: hidden; pointer-events: none;
    z-index: 3;
    border: none; margin: 0; background: transparent;
    box-sizing: border-box;
    display: none;
  }
  /* When highlight on: textarea text goes nearly transparent so overlay shows.
     color near-zero keeps native cursor + selection rendering intact. */
  #editor.highlight-on {
    color: rgba(232, 228, 220, 0.06) !important;
    caret-color: #e8e4dc !important;
    background: var(--bg) !important;
  }
  /* token colours — VSCode dark theme palette */
  .hl-title-key  { color: #9cdcfe; }
  .hl-title-val  { color: #ce9178; }
  .hl-scene      { color: #569cd6; font-weight: bold; }
  .hl-character  { color: #dcdcaa; font-weight: bold; }
  .hl-paren      { color: #6a8a6a; }
  .hl-dialogue   { color: #cccccc; }
  .hl-action     { color: #aad0e8; }
  .hl-transition { color: #c586c0; font-weight: bold; }
  .hl-centered   { color: #c586c0; }
  .hl-section    { color: #4ec9b0; font-weight: bold; }
  .hl-synopsis   { color: #6a9955; font-style: italic; }
  .hl-lyric      { color: #ce9178; font-style: italic; }
  .hl-pagebreak  { color: #555; }
  .hl-bold       { font-weight: bold; }
  .hl-italic     { font-style: italic; }
  .hl-under      { text-decoration: underline; }
  .hl-inline-note { color: #73c991; background: rgba(115,201,145,0.12); border-radius: 2px; padding: 0 2px; }

  /* ── Single combined action bar: smart buttons + insert buttons in one row ── */
  /* This replaces the old two-row toolbar + smart-bar layout */
  .editor-toolbar { display: none; } /* legacy — merged into .smart-bar */

  .smart-bar {
    display: flex; gap: 5px; padding: 5px 8px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--rule);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; align-items: center;
    min-height: 38px;
  }
  .smart-bar::-webkit-scrollbar { display: none; }

  /* Context label: tiny pill showing current element type */
  .smart-bar-label {
    flex-shrink: 0;
    font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--bg); background: var(--accent-dim);
    padding: 2px 6px; border-radius: 10px;
    margin-right: 2px; white-space: nowrap;
  }

  /* Smart action buttons: filled accent pills */
  .smart-btn {
    flex-shrink: 0; padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--accent-dim); color: var(--accent);
    border-radius: 14px; font-family: 'Courier Prime', monospace;
    font-size: 11px; cursor: pointer; white-space: nowrap;
  }
  .smart-btn:active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* Divider between smart buttons and insert buttons */
  .bar-divider {
    flex-shrink: 0; width: 1px; height: 20px;
    background: var(--rule); margin: 0 4px;
  }

  /* Insert tool buttons: plain square style */
  .tool-btn {
    flex-shrink: 0; padding: 5px 9px;
    background: var(--bg);
    border: 1px solid var(--rule); color: var(--muted);
    border-radius: 4px; font-family: 'Courier Prime', monospace;
    font-size: 11px; cursor: pointer; white-space: nowrap;
  }
  .tool-btn:active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* ── Editor panel: fill main completely ── */
  .editor-wrap {
    flex: 1; position: relative; display: flex; flex-direction: column;
    min-height: 0; overflow: hidden;
  }
  #editor {
    flex: 1; width: 100%; background: var(--bg); color: var(--text);
    border: none; outline: none; padding: 16px;
    font-family: 'Courier Prime', 'Courier New', monospace;
    font-size: 15px; line-height: 1.6; resize: none;
    -webkit-appearance: none; border-radius: 0; min-height: 0;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .autocomplete {
    position: absolute; background: var(--bg-elev); border: 1px solid var(--accent-dim);
    border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    max-height: 180px; overflow-y: auto; z-index: 20;
    min-width: 160px; max-width: 280px; display: none;
  }
  .autocomplete.show { display: block; }
  .ac-item {
    padding: 9px 12px; cursor: pointer;
    font-family: 'Courier Prime', monospace; font-size: 13px;
    color: var(--text); border-bottom: 1px solid var(--rule);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; justify-content: space-between; align-items: center;
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item.active, .ac-item:active { background: var(--accent); color: var(--bg); }
  .ac-item .kind { font-size: 9px; color: var(--muted); margin-left: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .ac-item.active .kind { color: var(--bg); }
  .stats {
    padding: 6px 14px; font-size: 11px; color: var(--muted);
    background: var(--bg-elev); border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between; letter-spacing: 0.5px;
  }
  #preview-wrap {
    flex: 1; overflow: auto; -webkit-overflow-scrolling: touch;
    background: #0e0e0e; padding: 16px 8px;
  }
  /*
    Real screenplay page geometry. 1in = 96px at 96dpi.
    8.5" x 11" = 816px x 1056px.
    Margins: top/bottom/right = 1" (96px), left = 1.5" (144px).
    Indents from page LEFT EDGE:
      character cue: 3.7" -> 211.2px from text-block left
      parenthetical: 3.1" -> 153.6px
      dialogue:      2.5" -> 96px
    Dialogue width = 3.5"; right margin from text-block = 1.5" -> 144px.
  */
  .page {
    background: var(--bg-paper); color: var(--ink);
    width: 816px; min-height: 1056px;
    margin: 0 auto 24px; padding: 96px 96px 96px 144px;
    box-shadow: var(--shadow);
    font-family: 'Courier Prime', 'Courier New', monospace;
    font-size: 12pt; line-height: 1; position: relative;
  }
  .page::before {
    content: attr(data-page); position: absolute;
    top: 48px; right: 96px; font-size: 12pt; color: var(--ink);
  }
  .page-content > * { line-height: 1; }
  .fnt-title-page { text-align: center; margin-top: 280px; margin-bottom: 60px; }
  .fnt-title-page .title { text-transform: uppercase; margin-bottom: 36px; line-height: 1.4; }
  .fnt-title-page .by { margin-bottom: 8px; }
  .fnt-title-page .author { margin-bottom: 36px; }
  .fnt-title-page .meta { margin-top: 36px; font-size: 12pt; }
  .page .footer {
    position: absolute; bottom: 96px; left: 144px; right: 96px;
    display: flex; justify-content: space-between; text-align: left; font-size: 12pt;
  }
  .page .footer .right { text-align: right; }
  .fnt-scene { text-transform: uppercase; font-weight: bold; margin: 24px 0 12px; }
  .fnt-action { margin: 12px 0; white-space: pre-wrap; }
  .fnt-character { text-transform: uppercase; margin: 24px 0 0 211px; }
  .fnt-paren { margin: 0 0 0 154px; }
  .fnt-dialogue { margin: 0 144px 0 96px; white-space: pre-wrap; }
  .fnt-transition { text-align: right; text-transform: uppercase; font-weight: bold; margin: 24px 0; }
  .fnt-centered { text-align: center; margin: 12px 0; }
  .fnt-section { color: var(--accent-dim); font-weight: bold; margin: 24px 0 12px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 4px; }
  .fnt-synopsis { font-style: italic; color: #6b5e44; margin: 8px 0; padding-left: 12px; border-left: 2px solid #c4a472; }
  .fnt-note { background: #fff3a8; color: #5c4a14; padding: 2px 6px; border-radius: 2px; font-size: 11pt; }
  .fnt-lyric { font-style: italic; margin-left: 96px; }
  .fnt-empty { text-align: center; color: var(--muted); font-style: italic; margin-top: 40%; background: none; padding: 0; }
  .preview-controls {
    position: absolute; bottom: 16px; right: 16px; display: flex; gap: 4px;
    z-index: 10; background: rgba(20,20,20,0.92); border: 1px solid var(--rule);
    border-radius: 22px; padding: 4px; backdrop-filter: blur(8px); align-items: center;
  }
  .zoom-btn {
    width: 34px; height: 34px; background: none; border: none;
    color: var(--text); font-size: 16px; cursor: pointer; border-radius: 50%;
  }
  .zoom-btn:active { background: var(--accent); color: var(--bg); }
  .zoom-label { color: var(--muted); font-size: 10px; letter-spacing: 1px; padding: 0 6px; min-width: 38px; text-align: center; }
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; display: none; opacity: 0; transition: opacity 0.25s; }
  .drawer-overlay.open { display: block; opacity: 1; }
  .drawer {
    position: fixed; top: 0; right: -340px; width: 320px; max-width: 85vw;
    height: 100dvh; background: var(--bg-elev); z-index: 51;
    box-shadow: -8px 0 24px rgba(0,0,0,0.5); transition: right 0.3s ease;
    display: flex; flex-direction: column; padding-top: env(safe-area-inset-top);
  }
  .drawer.open { right: 0; }
  .drawer-header { padding: 16px; border-bottom: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center; }
  .drawer-header h2 { margin: 0; font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; }
  .drawer-content { flex: 1; overflow-y: auto; padding: 8px 0; }
  .drawer-section { padding: 12px 16px 4px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .drawer-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    background: none; border: none; color: var(--text);
    font-family: 'Courier Prime', monospace; font-size: 14px;
    width: 100%; text-align: left; cursor: pointer;
  }
  .drawer-item:active { background: var(--bg); }
  .drawer-item .icon { width: 18px; text-align: center; color: var(--accent); }
  .drawer-item.danger { color: var(--danger); }
  .drawer-item.danger .icon { color: var(--danger); }
  .drawer-item .badge { margin-left: auto; background: var(--accent); color: var(--bg); font-size: 10px; padding: 2px 6px; border-radius: 10px; letter-spacing: 0.5px; }
  .drawer-item.toggle .badge { background: var(--rule); color: var(--muted); }
  .drawer-item.toggle.on .badge { background: var(--accent); color: var(--bg); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 60; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg-elev); border: 1px solid var(--rule); border-radius: 8px; padding: 20px; max-width: 420px; width: 100%; max-height: 80dvh; overflow-y: auto; }
  .modal h3 { margin: 0 0 12px; font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--accent); }
  .modal p, .modal li { font-size: 13px; line-height: 1.6; color: var(--text); }
  .modal code { background: var(--bg); padding: 1px 5px; border-radius: 3px; color: var(--accent); font-size: 12px; }
  .modal-buttons { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; flex-wrap: wrap; }
  .modal-btn {
    padding: 8px 16px; border: 1px solid var(--rule); background: var(--bg);
    color: var(--text); border-radius: 4px; font-family: 'Courier Prime', monospace;
    font-size: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
  }
  .modal-btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .modal input[type=text] { width: 100%; padding: 8px; background: var(--bg); border: 1px solid var(--rule); color: var(--text); border-radius: 4px; font-family: 'Courier Prime', monospace; margin: 8px 0; }
  .find-row { display: flex; gap: 6px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
  .find-status { font-size: 11px; color: var(--muted); margin-top: 8px; letter-spacing: 0.5px; }
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: var(--bg);
    padding: 10px 20px; border-radius: 6px; font-size: 12px;
    letter-spacing: 1px; text-transform: uppercase;
    opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 100;
    box-shadow: 0 6px 16px rgba(0,0,0,0.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ══ SCENE CARDS ══════════════════════════════════════════════ */
  #cards-panel { background: #111; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 10px; gap: 0; }
  .cards-grid { display: flex; flex-direction: column; gap: 10px; }
  .scene-card {
    background: var(--bg-elev); border: 1px solid var(--rule);
    border-radius: 8px; padding: 12px 14px;
    cursor: grab; user-select: none; -webkit-user-select: none;
    touch-action: none;
    transition: box-shadow 0.15s, opacity 0.15s;
    position: relative;
  }
  .scene-card.dragging { opacity: 0.4; }
  .scene-card.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
  .scene-card-num { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .scene-card-heading { font-size: 12px; color: #569cd6; font-weight: bold; text-transform: uppercase; margin-bottom: 6px; line-height: 1.3; }
  .scene-card-action { font-size: 12px; color: var(--muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .scene-card-chars { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .scene-card-char { font-size: 9px; color: var(--bg); background: var(--accent-dim); padding: 1px 5px; border-radius: 8px; letter-spacing: 0.5px; }
  .scene-card-meta { font-size: 9px; color: #555; margin-top: 6px; }
  .cards-empty { text-align: center; color: var(--muted); padding: 60px 20px; font-style: italic; font-size: 13px; }
  .cards-toolbar { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; background: var(--bg-elev); border-bottom: 1px solid var(--rule); }
  .cards-toolbar-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .cards-toolbar-btn { font-size: 11px; color: var(--accent); background: none; border: 1px solid var(--accent-dim); border-radius: 12px; padding: 4px 10px; cursor: pointer; }

  /* ══ VOICE DICTATION ══════════════════════════════════════════ */
  .voice-btn {
    width: 28px; height: 28px; border-radius: 5px; border: 1px solid var(--rule);
    background: none; color: var(--text); font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    margin-right: 4px; flex-shrink: 0;
  }
  .voice-btn.listening { background: #c97064; border-color: #c97064; color: white; animation: pulse 1s infinite; }
  .voice-btn.unsupported { opacity: 0.3; cursor: not-allowed; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .voice-status {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #c97064; color: white; padding: 8px 16px;
    border-radius: 20px; font-size: 12px; letter-spacing: 0.5px;
    z-index: 90; pointer-events: none; opacity: 0; transition: opacity 0.2s;
    white-space: nowrap;
  }
  .voice-status.show { opacity: 1; }

  /* ══ DRAFT VERSIONING ═════════════════════════════════════════ */
  .draft-list { display: flex; flex-direction: column; gap: 0; }
  .draft-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 0; border-bottom: 1px solid var(--rule);
  }
  .draft-item:last-child { border-bottom: none; }
  .draft-item-info { flex: 1; min-width: 0; }
  .draft-item-name { font-size: 13px; color: var(--text); font-weight: bold; }
  .draft-item-meta { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.3px; }
  .draft-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .draft-action-btn {
    font-size: 10px; padding: 4px 8px;
    border: 1px solid var(--rule); background: var(--bg);
    color: var(--text); border-radius: 4px; cursor: pointer;
    letter-spacing: 0.3px;
  }
  .draft-action-btn.restore { border-color: var(--accent-dim); color: var(--accent); }

  /* ── Pip Mode — symmetric margins (equal left/right) ──────── */
  /*
    Standard screenplay: left=1.5", right=1.0" (actor binding allowance).
    Pip mode: both sides = 1.0" for cleaner on-screen reading.

  }
</style>

<script>
/* PARSER */
const SCENE_RE = /^(INT|EXT|EST|INT\.?\/EXT|I\/E|INT\/EXT)[\.\s]/i;
const TRANSITION_RE = /^[A-Z\s]+TO:$/;
const CENTERED_RE = /^>\s*(.+?)\s*<$/;

function parseFountain(text) {
  if (!text || !text.trim()) return { titlePage: null, body: [] };
  let titlePage = null, body = text;
  const m = text.match(/^([\s\S]*?)\n\s*\n([\s\S]*)$/);
  if (m && /^[A-Za-z][A-Za-z \t]*:/.test(m[1])) { titlePage = parseTitlePage(m[1]); body = m[2]; }
  body = body.replace(/\/\*[\s\S]*?\*\//g, '');
  const lines = body.split('\n');
  const tokens = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i], trimmed = line.trim();
    const prev = i > 0 ? lines[i - 1] : '', next = i < lines.length - 1 ? lines[i + 1] : '';
    const prevBlank = prev.trim() === '', nextBlank = next.trim() === '';
    if (trimmed === '') { tokens.push({ type: 'blank' }); continue; }
    if (/^={3,}$/.test(trimmed)) { tokens.push({ type: 'pagebreak' }); continue; }
    const sm = trimmed.match(/^(#{1,6})\s+(.+)$/);
    if (sm) { tokens.push({ type: 'section', level: sm[1].length, text: sm[2] }); continue; }
    if (trimmed.startsWith('=') && !trimmed.startsWith('==')) { tokens.push({ type: 'synopsis', text: trimmed.slice(1).trim() }); continue; }
    const cm = trimmed.match(CENTERED_RE);
    if (cm) { tokens.push({ type: 'centered', text: cm[1] }); continue; }
    if (/^\.[^.]/.test(trimmed)) { tokens.push({ type: 'scene', text: trimmed.slice(1).trim() }); continue; }
    if (prevBlank && SCENE_RE.test(trimmed)) { tokens.push({ type: 'scene', text: trimmed }); continue; }
    if (/^>\s*[^<]+$/.test(trimmed) && !cm) { tokens.push({ type: 'transition', text: trimmed.slice(1).trim() }); continue; }
    if (prevBlank && nextBlank && TRANSITION_RE.test(trimmed)) { tokens.push({ type: 'transition', text: trimmed }); continue; }
    if (trimmed.startsWith('!')) { tokens.push({ type: 'action', text: trimmed.slice(1) }); continue; }
    if (trimmed.startsWith('@')) { tokens.push({ type: 'character', text: trimmed.slice(1).trim() }); continue; }
    if (trimmed.startsWith('~')) { tokens.push({ type: 'lyric', text: trimmed.slice(1).trim() }); continue; }
    if (prevBlank && !nextBlank && isCharacterCue(trimmed)) { tokens.push({ type: 'character', text: trimmed }); continue; }
    const lnb = findLastNonBlank(tokens);
    if (lnb && (lnb.type === 'character' || lnb.type === 'dialogue' || lnb.type === 'paren') && /^\(.*\)$/.test(trimmed)) {
      tokens.push({ type: 'paren', text: trimmed }); continue;
    }
    if (lnb && (lnb.type === 'character' || lnb.type === 'paren' || lnb.type === 'dialogue')) {
      const lt = tokens[tokens.length - 1];
      if (lt && lt.type !== 'blank') { tokens.push({ type: 'dialogue', text: line }); continue; }
    }
    tokens.push({ type: 'action', text: line });
  }
  return { titlePage, body: mergeRuns(tokens) };
}

function isCharacterCue(line) {
  if (!line) return false;
  let s = line.replace(/\^$/, '').trim().replace(/\s*\(.+?\)\s*$/, '');
  if (s.length === 0 || !/[A-Z]/.test(s) || /[a-z]/.test(s)) return false;
  return true;
}
function findLastNonBlank(tokens) {
  for (let i = tokens.length - 1; i >= 0; i--) if (tokens[i].type !== 'blank') return tokens[i];
  return null;
}

/* INLINE FORMATTING */

  o = o.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  o = o.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

/* SHARED LAYOUT (HTML preview & PDF export both use these) */
const LAYOUT = {
  pageW: 8.5, pageH: 11.0,
  marginL: 1.5, marginR: 1.0, marginT: 1.0, marginB: 1.0,
  characterLeft: 3.7, parenLeft: 3.1, dialogueLeft: 2.5,
  dialogueRight: 2.5, transitionRight: 1.0,
  charsPerInch: 10, linesPerInch: 6,
};

const ELEM_WIDTHS = {
  action: widthChars(LAYOUT.marginL, LAYOUT.marginR),
  character: 38,
  paren: widthChars(LAYOUT.parenLeft, LAYOUT.marginR + 1.0),
  dialogue: widthChars(LAYOUT.dialogueLeft, LAYOUT.dialogueRight),
  transition: 60, centered: 60,
  lyric: widthChars(LAYOUT.dialogueLeft, LAYOUT.dialogueRight),

}

    case 'scene': return 2 + wrapLine(stripFormatting(tok.text), ELEM_WIDTHS.action).length;
    case 'action': return 1 + wrapLine(stripFormatting(tok.text), ELEM_WIDTHS.action).length;
    case 'character': return 2;
    case 'paren': return wrapLine(stripFormatting(tok.text), ELEM_WIDTHS.paren).length;
    case 'dialogue': return wrapLine(stripFormatting(tok.text), ELEM_WIDTHS.dialogue).length;
    case 'transition': return 3;
    case 'centered': return 1 + wrapLine(stripFormatting(tok.text), ELEM_WIDTHS.centered).length;
    case 'lyric': return wrapLine(stripFormatting(tok.text), ELEM_WIDTHS.lyric).length;

}
const LINES_PER_PAGE = Math.floor((LAYOUT.pageH - LAYOUT.marginT - LAYOUT.marginB) * LAYOUT.linesPerInch);

  const pages = []; let cur = []; let lc = 0;
  for (const tok of body) {

    const lines = tokenLineCount(tok);
    if (lc + lines > LINES_PER_PAGE && cur.length > 0) { pages.push(cur); cur = []; lc = 0; }

}

/* HTML PREVIEW RENDERER */
function renderToHtml(parsed) {
  const { titlePage, body } = parsed;
  if ((!body || body.length === 0) && !titlePage) {
    return '<div class="page fnt-empty"><p>Start writing in the Write tab to see your screenplay rendered here.</p></div>';
  }

    if (titlePage.credit) html += `<div class="by">${applyInlineFormatting(titlePage.credit)}</div>`;
    else if (titlePage.author || titlePage.authors) html += '<div class="by">written by</div>';
    if (titlePage.author) html += `<div class="author">${applyInlineFormatting(titlePage.author)}</div>`;
    if (titlePage.authors) html += `<div class="author">${applyInlineFormatting(titlePage.authors)}</div>`;
    if (titlePage.source) html += `<div>${applyInlineFormatting(titlePage.source)}</div>`;
    html += '</div>';

  pages.forEach((page, idx) => {

    case 'action': return `<div class="fnt-action">${fmt(tok.text)}</div>`;
    case 'character': return `<div class="fnt-character">${fmt(tok.text)}</div>`;
    case 'paren': return `<div class="fnt-paren">${fmt(tok.text)}</div>`;
    case 'dialogue': return `<div class="fnt-dialogue">${fmt(tok.text)}</div>`;

    case 'centered': return `<div class="fnt-centered">${fmt(tok.text)}</div>`;

/* PDF EXPORT */
function exportPDF(parsed, filename) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'in', format: 'letter' });
  doc.setFont('Courier', 'normal'); doc.setFontSize(12);
  const L = LAYOUT, LINE_H = 1 / L.linesPerInch, MAX_Y = L.pageH - L.marginB;
  let y = L.marginT, pageNum = 1;

  function drawHeader() {
    if (pageNum > 1) { doc.setFontSize(12); doc.text(pageNum + '.', L.pageW - L.marginR, 0.5, { align: 'right' }); }
  }
  function newPage() { doc.addPage(); pageNum++; y = L.marginT; drawHeader(); }
  function writeLines(lines, x, opts = {}) {
    for (const ln of lines) {
      if (y + LINE_H > MAX_Y) newPage();
      const t = opts.upper ? ln.toUpperCase() : ln;
      if (opts.align === 'right') doc.text(t, x, y, { align: 'right' });
      else if (opts.align === 'center') doc.text(t, x, y, { align: 'center' });
      else doc.text(t, x, y);
      y += LINE_H;
    }
  }
  function writeBlock(text, x, max, opts = {}) { writeLines(wrapLine(stripFormatting(text), max), x, opts); }
  function blankLine() { if (y + LINE_H > MAX_Y) { newPage(); return; } y += LINE_H; }

  if (parsed.titlePage) {
    const t = parsed.titlePage, cx = L.pageW / 2; let titleY = L.pageH * 0.4;
    doc.setFontSize(14);
    if (t.title) { doc.text(stripFormatting(t.title).toUpperCase(), cx, titleY, { align: 'center' }); titleY += 0.4; }
    doc.setFontSize(12);
    if (t.credit) { doc.text(stripFormatting(t.credit), cx, titleY, { align: 'center' }); titleY += 0.2; }
    else if (t.author) { doc.text('written by', cx, titleY, { align: 'center' }); titleY += 0.2; }
    if (t.author) { doc.text(stripFormatting(t.author), cx, titleY, { align: 'center' }); titleY += 0.4; }
    if (t.source) { doc.text(stripFormatting(t.source), cx, titleY, { align: 'center' }); titleY += 0.2; }
    if (t.draft_date || t['draft date']) doc.text(stripFormatting(t.draft_date || t['draft date']), L.marginL, L.pageH - 1.0);
    if (t.contact) {
      const lines = stripFormatting(t.contact).split('\n');
      let cy = L.pageH - 1.0 - (lines.length - 1) * LINE_H;
      for (const ln of lines) { doc.text(ln, L.pageW - L.marginR, cy, { align: 'right' }); cy += LINE_H; }
    }
    newPage(); pageNum = 1;
  }
  drawHeader();

  for (const tok of parsed.body) {
    switch (tok.type) {
      case 'pagebreak': newPage(); break;
      case 'scene':
        if (y > L.marginT + LINE_H) blankLine();
        writeBlock(tok.text, L.marginL, ELEM_WIDTHS.action, { upper: true });
        blankLine(); break;
      case 'action': blankLine(); writeBlock(tok.text, L.marginL, ELEM_WIDTHS.action); break;
      case 'character': blankLine(); writeBlock(tok.text, L.characterLeft, ELEM_WIDTHS.character, { upper: true }); break;
      case 'paren': writeBlock(tok.text, L.parenLeft, ELEM_WIDTHS.paren); break;
      case 'dialogue': writeBlock(tok.text, L.dialogueLeft, ELEM_WIDTHS.dialogue); break;
      case 'transition':
        blankLine();
        writeBlock(tok.text, L.pageW - L.transitionRight, ELEM_WIDTHS.transition, { upper: true, align: 'right' });
        blankLine(); break;
      case 'centered': blankLine(); writeBlock(tok.text, L.pageW / 2, ELEM_WIDTHS.centered, { align: 'center' }); break;
      case 'lyric': writeBlock(tok.text, L.dialogueLeft, ELEM_WIDTHS.lyric); break;
    }
  }
  doc.save(filename || 'screenplay.pdf');
}

/* DICTIONARY */
function extractDictionary(text) {
  const characters = new Map(), locations = new Map(), timesOfDay = new Map();
  if (!text) return { characters: [], locations: [], timesOfDay: [] };
  const parsed = parseFountain(text);
  for (const tok of parsed.body) {
    if (tok.type === 'character') {
      const name = tok.text.replace(/\^$/, '').replace(/\s*\(.+?\)\s*$/, '').trim();
      if (name) characters.set(name, (characters.get(name) || 0) + 1);
    } else if (tok.type === 'scene') {
      const m = tok.text.match(/^(?:INT\.?|EXT\.?|EST\.?|INT\.?\/EXT\.?|I\/E)\s+(.+?)(?:\s*[-–—]\s*(.+))?$/i);
      if (m) {
        const loc = m[1].trim(), tod = m[2] ? m[2].trim() : null;
        if (loc) locations.set(loc, (locations.get(loc) || 0) + 1);
        if (tod) timesOfDay.set(tod, (timesOfDay.get(tod) || 0) + 1);
      }
    }
  }
  for (const t of ['DAY','NIGHT','MORNING','EVENING','CONTINUOUS','LATER','MOMENTS LATER','DAWN','DUSK']) {
    if (!timesOfDay.has(t)) timesOfDay.set(t, 0);
  }
  const sortByCount = (a, b) => b[1] - a[1] || a[0].localeCompare(b[0]);
  return {
    characters: [...characters.entries()].sort(sortByCount).map(([n]) => n),
    locations: [...locations.entries()].sort(sortByCount).map(([n]) => n),
    timesOfDay: [...timesOfDay.entries()].sort(sortByCount).map(([n]) => n),
  };
}
let dictionaryCache = { characters: [], locations: [], timesOfDay: [] };
function refreshDictionary() { dictionaryCache = extractDictionary(editor.value); }

/* CONTEXT DETECTION */
function getCurrentLineInfo() {
  const pos = editor.selectionStart, text = editor.value;
  const before = text.slice(0, pos);
  const lineStart = before.lastIndexOf('\n') + 1;
  const lineEnd = text.indexOf('\n', pos);
  const lineEndPos = lineEnd === -1 ? text.length : lineEnd;
  const currentLine = text.slice(lineStart, lineEndPos);
  const beforeOnLine = text.slice(lineStart, pos);
  return { pos, lineStart, lineEndPos, currentLine, beforeOnLine, before };
}
function detectContext(textBefore, currentLine) {
  const lines = textBefore.split('\n');
  const idx = lines.length - 1;
  const thisLine = currentLine !== undefined ? currentLine : lines[idx];
  const trimmed = thisLine.trim();
  let prevTrimmed = '', blankBetween = false;
  for (let i = idx - 1; i >= 0; i--) {
    if (lines[i].trim() === '') { blankBetween = true; continue; }
    prevTrimmed = lines[i].trim(); break;
  }
  if (blankBetween || idx === 0) {
    if (trimmed.startsWith('.') && !trimmed.startsWith('..')) return 'scene';
    if (trimmed.startsWith('@')) return 'character';
    if (trimmed.startsWith('!')) return 'action';
    if (SCENE_RE.test(trimmed)) return 'scene';
    if (TRANSITION_RE.test(trimmed)) return 'transition';
    if (isCharacterCue(trimmed) && trimmed.length <= 40) return 'character';
    return 'action';
  }
  if (isCharacterCue(prevTrimmed) || /^@/.test(prevTrimmed)) {
    if (/^\(/.test(trimmed)) return 'paren';
    return 'dialogue';
  }
  if (/^\(.*\)$/.test(prevTrimmed)) return 'dialogue';
  for (let i = idx - 1; i >= 0; i--) {
    const t = lines[i].trim();
    if (t === '') break;
    if (isCharacterCue(t) || /^@/.test(t) || /^\(.*\)$/.test(t)) return 'dialogue';
  }
  return 'action';
}

/* AUTOCOMPLETE */
let acState = { open: false, items: [], selectedIdx: 0, startPos: 0, endPos: 0, context: null };
const SCENE_PREFIXES = ['INT.', 'EXT.', 'INT./EXT.', 'I/E', 'EST.'];

function updateAutocomplete() {
  if (!prefs.autocomplete) { hideAutocomplete(); return; }
  const { pos, lineStart, currentLine, beforeOnLine, before } = getCurrentLineInfo();
  const ctx = detectContext(before, currentLine);
  let items = [], acContext = null, tokenStart = lineStart;

  if (ctx === 'character') {
    const hadAt = beforeOnLine.startsWith('@');
    const cleanLine = hadAt ? beforeOnLine.slice(1) : beforeOnLine;
    tokenStart = lineStart + (hadAt ? 1 : 0);
    const query = cleanLine.toUpperCase();
    if (query.length >= 1) {
      const matches = dictionaryCache.characters.filter(c => c.toUpperCase().startsWith(query) && c.toUpperCase() !== query);
      items = matches.slice(0, 8).map(name => ({ value: name, label: name, kind: 'character' }));
      acContext = 'character';
    }
  } else if (ctx === 'scene') {
    const hadDot = beforeOnLine.startsWith('.');
    const lineText = hadDot ? beforeOnLine.slice(1) : beforeOnLine;
    tokenStart = lineStart + (hadDot ? 1 : 0);
    const upper = lineText.toUpperCase();
    const prefixMatch = upper.match(/^(INT\.?\/EXT\.?|I\/E|INT\.?|EXT\.?|EST\.?)\s+/);
    if (!prefixMatch) {
      const matches = SCENE_PREFIXES.filter(p => p.startsWith(upper) && p !== upper);
      items = matches.map(p => ({ value: p + ' ', label: p, kind: 'prefix' }));
      acContext = 'scene-prefix';
    } else {
      const afterPrefix = lineText.slice(prefixMatch[0].length);
      const dashSearch = afterPrefix.match(/(\s+[-–—]\s+)/);
      if (dashSearch) {
        const dashIdx = afterPrefix.indexOf(dashSearch[0]);
        const todStart = dashIdx + dashSearch[0].length;
        const todTyped = afterPrefix.slice(todStart).toUpperCase();
        tokenStart = lineStart + (hadDot ? 1 : 0) + prefixMatch[0].length + todStart;
        const matches = dictionaryCache.timesOfDay.filter(t => t.startsWith(todTyped) && t !== todTyped);
        items = matches.slice(0, 8).map(t => ({ value: t, label: t, kind: 'time' }));
        acContext = 'scene-tod';
      } else {
        const locTyped = afterPrefix.toUpperCase();
        tokenStart = lineStart + (hadDot ? 1 : 0) + prefixMatch[0].length;
        if (locTyped.length >= 1) {
          const matches = dictionaryCache.locations.filter(l => l.toUpperCase().startsWith(locTyped) && l.toUpperCase() !== locTyped);
          items = matches.slice(0, 8).map(l => ({ value: l, label: l, kind: 'location' }));
          acContext = 'scene-location';
        }
      }
    }
  }
  if (items.length === 0) { hideAutocomplete(); return; }
  acState = { open: true, items, selectedIdx: 0, startPos: tokenStart, endPos: pos, context: acContext };
  renderAutocomplete();
}
function renderAutocomplete() {
  if (!acState.open) return;
  autocompleteEl.innerHTML = acState.items.map((item, i) =>
    `<div class="ac-item ${i === acState.selectedIdx ? 'active' : ''}" data-idx="${i}">
      <span>${escapeHtml(item.label)}</span><span class="kind">${item.kind}</span>
    </div>`).join('');

function positionAutocomplete() {
  const editorRect = editor.getBoundingClientRect();
  const before = editor.value.slice(0, editor.selectionStart);
  const lineNum = before.split('\n').length - 1;
  const lineHeight = parseFloat(getComputedStyle(editor).lineHeight) || 24;
  const padTop = parseFloat(getComputedStyle(editor).paddingTop) || 16;

  const caretY = padTop + (lineNum * lineHeight) - scrollTop;
  const editorH = editorRect.height, dropdownH = 180;
  let topInWrap = caretY + lineHeight + 6;
  if (topInWrap + dropdownH > editorH - 10) topInWrap = caretY - dropdownH - 6;
  topInWrap = Math.max(8, Math.min(topInWrap, editorH - dropdownH - 8));
  autocompleteEl.style.top = topInWrap + 'px';
  autocompleteEl.style.left = '16px';

}
function hideAutocomplete() { acState.open = false; autocompleteEl.classList.remove('show'); }
function applyAutocomplete(idx) {
  if (!acState.open) return;
  const item = acState.items[idx ?? acState.selectedIdx];
  if (!item) return;
  const text = editor.value;
  let replacement = item.value;
  let cursorAfter = acState.startPos + replacement.length;
  if (acState.context === 'character') { replacement = replacement + '\n'; cursorAfter = acState.startPos + replacement.length; }
  else if (acState.context === 'scene-location') { replacement = replacement + ' - '; cursorAfter = acState.startPos + replacement.length; }
  else if (acState.context === 'scene-tod') { replacement = replacement + '\n\n'; cursorAfter = acState.startPos + replacement.length; }

const CONTEXT_LABELS = {
  action: 'Action', scene: 'Scene Heading', character: 'Character',
  dialogue: 'Dialogue', paren: 'Parenthetical', transition: 'Transition',
};
function updateSmartBar() {
  const { before, currentLine } = getCurrentLineInfo();
  const ctx = detectContext(before, currentLine);
  smartContext.textContent = CONTEXT_LABELS[ctx] || 'Action';
  const actions = SMART_ACTIONS[ctx] || SMART_ACTIONS.action;
  // Remove only the dynamic smart buttons (between label and divider)
  const divider = document.getElementById('barDivider');
  while (smartBar.children[1] !== divider) {
    smartBar.removeChild(smartBar.children[1]);
  }
  // Insert new smart buttons before the divider
  for (const a of actions) {
    const btn = document.createElement('button');
    btn.className = 'smart-btn';
    btn.textContent = a.label;
    btn.addEventListener('pointerdown', (e) => { e.preventDefault(); runSmartAction(a, ctx); });
    smartBar.insertBefore(btn, divider);
  }
}
function runSmartAction(action, ctx) {
  const e = editor;
  const pos = e.selectionStart, text = e.value;
  const before = text.slice(0, pos), after = text.slice(pos);
  const lineStart = before.lastIndexOf('\n') + 1;
  const lineEnd = after.indexOf('\n');
  const restOfLine = lineEnd === -1 ? after : after.slice(0, lineEnd);
  const beforeOnLine = before.slice(lineStart);
  const fullLine = beforeOnLine + restOfLine;
  const afterLine = lineEnd === -1 ? '' : after.slice(lineEnd);
  function leadingBlank() {
    if (before === '') return '';
    if (before.endsWith('\n\n')) return '';
    if (before.endsWith('\n')) return '\n';
    return '\n\n';
  }
  let newValue, newPos;
  switch (action.kind) {
    case 'append': newValue = before + action.text + after; newPos = pos + action.text.length; break;
    case 'newline': newValue = before + '\n' + after; newPos = pos + 1; break;
    case 'newline2': newValue = before + '\n\n' + after; newPos = pos + 2; break;
    case 'newscene': { const lb = leadingBlank(); newValue = before + lb + 'INT. ' + after; newPos = pos + lb.length + 5; break; }
    case 'newchar': { const lb = leadingBlank(); newValue = before + lb + after; newPos = pos + lb.length; break; }
    case 'cutto': { const lb = leadingBlank(); newValue = before + lb + 'CUT TO:\n\n' + after; newPos = pos + lb.length + 9; break; }
    case 'fadeout': { const lb = leadingBlank(); newValue = before + lb + 'FADE OUT.\n\n' + after; newPos = pos + lb.length + 11; break; }
    case 'newparen': newValue = before + '\n' + action.text + '\n' + after; newPos = pos + 1 + action.text.length + 1; break;
    case 'fillparen':
      if (/^\(\s*\)$/.test(fullLine.trim())) {
        const newLine = '(' + action.text + ')';
        newValue = text.slice(0, lineStart) + newLine + afterLine;
        newPos = lineStart + newLine.length;
      } else {
        const ins = '(' + action.text + ')';
        newValue = before + ins + after;
        newPos = pos + ins.length;
      }
      break;
    case 'replace-line': {
      const prefixBlank = lineStart === 0 ? '' : (text.slice(Math.max(0, lineStart - 2), lineStart) === '\n\n' ? '' : '\n');
      newValue = text.slice(0, lineStart) + prefixBlank + action.text + (lineEnd === -1 ? '\n\n' : afterLine);
      newPos = lineStart + prefixBlank.length + action.text.length;
      break;
    }
    case 'replace-prefix': {
      const m = fullLine.match(/^(INT\.?\/EXT\.?|I\/E|INT\.?|EXT\.?|EST\.?)\s+(.*)$/i);
      const newLine = m ? action.text + m[2] : action.text + fullLine;
      newValue = text.slice(0, lineStart) + newLine + afterLine;
      newPos = lineStart + newLine.length;
      break;
    }
    case 'append-tod': {
      const m = fullLine.match(/^(.+?)(\s+[-–—]\s+.+)?$/);
      const base = m ? m[1].trimEnd() : fullLine;
      const newLine = base + ' - ' + action.text;
      newValue = text.slice(0, lineStart) + newLine + afterLine;
      newPos = lineStart + newLine.length;
      break;
    }
    default: return;
  }
  e.value = newValue;
  e.focus();
  e.selectionStart = e.selectionEnd = newPos;
  afterEdit();
}
function afterEdit() {
  scheduleSave(); scheduleRender(); updateStats(); updateSmartBar(); updateAutocomplete(); syncHighlight();
}

  saveTimer = setTimeout(() => {

    const parsed = parseFountain(editor.value);
    const title = (parsed.titlePage && parsed.titlePage.title) ? parsed.titlePage.title : 'Untitled';
    const words = editor.value.trim() ? editor.value.trim().split(/\s+/).length : 0;
    updateDocMeta(currentDocId, {

function insertSnippet(kind) {
  const e = editor;
  const start = e.selectionStart, end = e.selectionEnd;
  const before = e.value.slice(0, start), selected = e.value.slice(start, end), after = e.value.slice(end);
  function leadingBlank() {
    if (before === '') return '';
    if (before.endsWith('\n\n')) return '';
    if (before.endsWith('\n')) return '\n';
    return '\n\n';
  }
  let snippet = '', cursorOffset = 0;
  switch (kind) {
    case 'scene': snippet = leadingBlank() + 'INT. LOCATION - DAY\n\n'; cursorOffset = snippet.length - 2; break;
    case 'character': snippet = leadingBlank() + 'CHARACTER\n'; cursorOffset = snippet.length; break;
    case 'paren': snippet = '(' + (selected || 'beat') + ')\n'; cursorOffset = snippet.length; break;
    case 'transition': snippet = leadingBlank() + 'CUT TO:\n\n'; cursorOffset = snippet.length - 2; break;
    case 'centered': snippet = '> ' + (selected || 'centered text') + ' <'; cursorOffset = snippet.length; break;
    case 'bold': snippet = '**' + (selected || 'bold') + '**'; cursorOffset = selected ? snippet.length : snippet.length - 2; break;
    case 'italic': snippet = '*' + (selected || 'italic') + '*'; cursorOffset = selected ? snippet.length : snippet.length - 1; break;
    case 'under': snippet = '_' + (selected || 'underlined') + '_'; cursorOffset = selected ? snippet.length : snippet.length - 1; break;
    case 'note': snippet = '[[' + (selected || 'note') + ']]'; cursorOffset = selected ? snippet.length : snippet.length - 2; break;
    case 'section': snippet = leadingBlank() + '# ' + (selected || 'Section') + '\n\n'; cursorOffset = snippet.length; break;
    case 'pagebreak': snippet = leadingBlank() + '===\n\n'; cursorOffset = snippet.length; break;
  }
  e.value = before + snippet + after;
  e.focus();
  e.selectionStart = e.selectionEnd = before.length + cursorOffset;
  afterEdit();
}

let findState = { query: '', lastIdx: -1 };
document.getElementById('findBtn').addEventListener('click', () => {
  closeDrawer();
  showModal(`<h3>Find &amp; Replace</h3>
    <input type="text" id="findInput" placeholder="Find..." value="${escapeHtml(findState.query)}">
    <input type="text" id="replaceInput" placeholder="Replace with...">
    <div class="find-row">
      <button class="modal-btn" id="findNext">Find Next</button>
      <button class="modal-btn" id="replaceOne">Replace</button>
      <button class="modal-btn" id="replaceAll">Replace All</button>
    </div>
    <div class="find-status" id="findStatus"></div>
    <div class="modal-buttons"><button class="modal-btn primary" onclick="closeModal()">Done</button></div>`);
  const findInput = document.getElementById('findInput');
  const replaceInput = document.getElementById('replaceInput');
  const status = document.getElementById('findStatus');
  findInput.focus();
  function findNext() {
    const q = findInput.value;
    if (!q) { status.textContent = ''; return; }
    findState.query = q;
    const text = editor.value;
    let from = findState.lastIdx + 1;
    if (from >= text.length) from = 0;
    let idx = text.toLowerCase().indexOf(q.toLowerCase(), from);
    if (idx === -1) {
      idx = text.toLowerCase().indexOf(q.toLowerCase(), 0);
      if (idx === -1) { status.textContent = 'Not found'; findState.lastIdx = -1; return; }
      status.textContent = 'Wrapped to top';
    } else status.textContent = '';
    findState.lastIdx = idx;
    editor.focus();
    editor.selectionStart = idx;
    editor.selectionEnd = idx + q.length;
    const lines = text.slice(0, idx).split('\n').length;
    const lh = parseFloat(getComputedStyle(editor).lineHeight) || 24;
    editor.scrollTop = Math.max(0, (lines - 3) * lh);
  }
  function replaceOne() {
    const q = findInput.value, r = replaceInput.value;
    if (!q) return;
    if (editor.selectionStart !== editor.selectionEnd &&
        editor.value.slice(editor.selectionStart, editor.selectionEnd).toLowerCase() === q.toLowerCase()) {
      const start = editor.selectionStart;
      editor.value = editor.value.slice(0, start) + r + editor.value.slice(editor.selectionEnd);
      editor.selectionStart = editor.selectionEnd = start + r.length;
      findState.lastIdx = start + r.length - 1;
      afterEdit(); refreshDictionary();
      status.textContent = 'Replaced';
    }
    findNext();
  }
  function replaceAll() {
    const q = findInput.value, r = replaceInput.value;
    if (!q) return;
    const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    let count = 0;
    editor.value = editor.value.replace(re, () => { count++; return r; });
    afterEdit(); refreshDictionary();
    status.textContent = `Replaced ${count} occurrence${count === 1 ? '' : 's'}`;
  }
  document.getElementById('findNext').addEventListener('click', findNext);
  document.getElementById('replaceOne').addEventListener('click', replaceOne);
  document.getElementById('replaceAll').addEventListener('click', replaceAll);
  findInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') findNext(); });
});

document.getElementById('outlineBtn').addEventListener('click', () => {
  closeDrawer();
  const text = editor.value;
  const lines = text.split('\n');
  const items = [];
  let charPos = 0;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i], trimmed = line.trim();
    const prevBlank = i === 0 || lines[i - 1].trim() === '';
    if (/^#{1,6}\s+/.test(trimmed)) {
      const m = trimmed.match(/^(#{1,6})\s+(.+)$/);
      items.push({ kind: 'section', level: m[1].length, text: m[2], pos: charPos });
    } else if (trimmed.startsWith('=') && !trimmed.startsWith('==')) {
      items.push({ kind: 'synopsis', text: trimmed.slice(1).trim(), pos: charPos });
    } else if (trimmed.startsWith('.') && !trimmed.startsWith('..')) {
      items.push({ kind: 'scene', text: trimmed.slice(1).trim(), pos: charPos });
    } else if (prevBlank && SCENE_RE.test(trimmed)) {
      items.push({ kind: 'scene', text: trimmed, pos: charPos });
    }
    charPos += line.length + 1;
  }
  const itemsHtml = items.length === 0
    ? '<p style="color:#888">No scenes or sections yet. Add scene headings (INT./EXT.) to populate your outline.</p>'
    : items.map(it => {
        const indent = it.kind === 'section' ? (it.level - 1) * 12 : (it.kind === 'synopsis' ? 16 : 8);
        const prefix = it.kind === 'section' ? '# ' : it.kind === 'synopsis' ? '› ' : '◉ ';
        const color = it.kind === 'section' ? '#d4a574' : it.kind === 'synopsis' ? '#888' : '#e8e4dc';
        return `<button class="modal-btn" style="display:block;text-align:left;width:100%;margin:4px 0;padding-left:${indent + 12}px;text-transform:none;letter-spacing:0;color:${color};font-size:13px" data-pos="${it.pos}">${prefix}${escapeHtml(it.text)}</button>`;
      }).join('');
  showModal(`<h3>Outline</h3>

function countOccurrences(text) {
  const characters = {}, locations = {};
  const parsed = parseFountain(text);
  for (const tok of parsed.body) {
    if (tok.type === 'character') {
      const name = tok.text.replace(/\^$/, '').replace(/\s*\(.+?\)\s*$/, '').trim();
      if (name) characters[name] = (characters[name] || 0) + 1;
    } else if (tok.type === 'scene') {
      const m = tok.text.match(/^(?:INT\.?|EXT\.?|EST\.?|INT\.?\/EXT\.?|I\/E)\s+(.+?)(?:\s*[-–—]\s*.+)?$/i);
      if (m) { const loc = m[1].trim(); if (loc) locations[loc] = (locations[loc] || 0) + 1; }
    }
  }
  return { characters, locations };
}

/* ═══════════════════════════════════════════════════════════════
   SYNTAX HIGHLIGHTING
   The highlight-layer div sits ABOVE the textarea (z-index 3).
   The textarea text is made near-transparent so the overlay colours
   show through, while the browser's native cursor and selection
   rendering (which ignores text colour) stay fully visible.
   All insertions from autocomplete/smartbar/toolbar call syncHighlight()
   so the overlay stays in sync after every edit.
   ═══════════════════════════════════════════════════════════════ */

const highlightLayer = document.getElementById('highlight-layer');
const editorWrap = document.querySelector('.editor-wrap');
let highlightEnabled = false;

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function applyInlineHL(text) {
  let o = escHtml(text);
  o = o.replace(/\[\[(.+?)\]\]/g, '<span class="hl-inline-note">[[<span>$1</span>]]</span>');
  o = o.replace(/\*\*\*(.+?)\*\*\*/g, '<span class="hl-bold hl-italic">***$1***</span>');
  o = o.replace(/\*\*(.+?)\*\*/g, '<span class="hl-bold">**$1**</span>');
  o = o.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<span class="hl-italic">*$1*</span>');
  o = o.replace(/_(.+?)_/g, '<span class="hl-under">_$1_</span>');
  return o;
}

function buildHighlight(text) {
  if (!text) return '\n';
  const lines = text.split('\n');
  const out = [];

  // Detect title page
  let inTitlePage = false, titlePageDone = false;
  const firstBlank = text.indexOf('\n\n');
  const headBlock = firstBlank === -1 ? text : text.slice(0, firstBlank);
  if (/^[A-Za-z][A-Za-z \t]*:/m.test(headBlock)) inTitlePage = true;

  let lastNonBlankType = null;
  let blankCount = 0;

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    const trimmed = raw.trim();

    // Title page
    if (inTitlePage && !titlePageDone) {
      if (trimmed === '') {
        titlePageDone = true; inTitlePage = false;
        out.push(''); blankCount = 1; lastNonBlankType = null; continue;
      }
      const m = raw.match(/^([A-Za-z][A-Za-z \t]*):([\s\S]*)$/);
      if (m) {
        out.push('<span class="hl-title-key">' + escHtml(m[1]) + ':</span><span class="hl-title-val">' + escHtml(m[2]) + '</span>');
      } else {
        out.push('<span class="hl-title-val">' + escHtml(raw) + '</span>');
      }
      continue;
    }

    if (trimmed === '') {
      out.push(''); blankCount++; continue;
    }

    const prevBlank = blankCount > 0;
    blankCount = 0;

    // Page break ===
    if (/^={3,}$/.test(trimmed)) {
      out.push('<span class="hl-pagebreak">' + escHtml(raw) + '</span>');
      lastNonBlankType = 'pagebreak'; continue;
    }
    // Section #
    if (/^#{1,6}\s/.test(trimmed)) {
      out.push('<span class="hl-section">' + escHtml(raw) + '</span>');
      lastNonBlankType = 'section'; continue;
    }
    // Synopsis =
    if (trimmed.startsWith('=') && !trimmed.startsWith('==')) {
      out.push('<span class="hl-synopsis">' + escHtml(raw) + '</span>');
      lastNonBlankType = 'synopsis'; continue;
    }
    // Centered > text <
    if (/^>\s*.+?\s*<$/.test(trimmed)) {
      out.push('<span class="hl-centered">' + applyInlineHL(raw) + '</span>');
      lastNonBlankType = 'centered'; continue;
    }
    // Forced transition >
    if (/^>\s*[^<]+$/.test(trimmed)) {
      out.push('<span class="hl-transition">' + escHtml(raw) + '</span>');
      lastNonBlankType = 'transition'; continue;
    }
    // Transition ALL CAPS TO:
    if (prevBlank && /^[A-Z\s]+TO:$/.test(trimmed)) {
      out.push('<span class="hl-transition">' + escHtml(raw) + '</span>');
      lastNonBlankType = 'transition'; continue;
    }
    // Scene heading (auto-detected)
    if (prevBlank && /^(INT|EXT|EST|INT\.?\/EXT|I\/E|INT\/EXT)[\. ]/i.test(trimmed)) {
      out.push('<span class="hl-scene">' + escHtml(raw) + '</span>');
      lastNonBlankType = 'scene'; continue;
    }
    // Forced scene .
    if (/^\.[^.]/.test(trimmed)) {
      out.push('<span class="hl-scene">' + escHtml(raw) + '</span>');
      lastNonBlankType = 'scene'; continue;
    }
    // Forced action !
    if (trimmed.startsWith('!')) {
      out.push('<span class="hl-action">' + applyInlineHL(raw) + '</span>');
      lastNonBlankType = 'action'; continue;
    }
    // Lyric ~
    if (trimmed.startsWith('~')) {
      out.push('<span class="hl-lyric">' + escHtml(raw) + '</span>');
      lastNonBlankType = 'lyric'; continue;
    }
    // Forced character @
    if (trimmed.startsWith('@')) {
      out.push('<span class="hl-character">' + escHtml(raw) + '</span>');
      lastNonBlankType = 'character'; continue;
    }
    // Character cue: ALL CAPS after blank
    if (prevBlank && isCharacterCue(trimmed)) {
      out.push('<span class="hl-character">' + escHtml(raw) + '</span>');
      lastNonBlankType = 'character'; continue;
    }
    // Parenthetical
    if ((lastNonBlankType === 'character' || lastNonBlankType === 'dialogue' || lastNonBlankType === 'paren')
        && /^\(.*\)$/.test(trimmed)) {
      out.push('<span class="hl-paren">' + escHtml(raw) + '</span>');
      lastNonBlankType = 'paren'; continue;
    }
    // Dialogue (no blank between, after character/paren/dialogue)
    if (!prevBlank && (lastNonBlankType === 'character' || lastNonBlankType === 'paren' || lastNonBlankType === 'dialogue')) {
      out.push('<span class="hl-dialogue">' + applyInlineHL(raw) + '</span>');
      lastNonBlankType = 'dialogue'; continue;
    }
    // Default: action
    out.push('<span class="hl-action">' + applyInlineHL(raw) + '</span>');
    lastNonBlankType = 'action';
  }

  return out.join('\n') + '\n';
}

function syncHighlight() {
  if (!highlightEnabled) return;
  highlightLayer.innerHTML = buildHighlight(editor.value);
  highlightLayer.scrollTop = editor.scrollTop;
  highlightLayer.scrollLeft = editor.scrollLeft;
}

function enableHighlight() {

  editorWrap.classList.remove('highlight-on');

}

editor.addEventListener('scroll', () => {

/* ═══════════════════════════════════════════════════════════════
   SCENE CARDS
   ═══════════════════════════════════════════════════════════════ */


/* ═══════════════════════════════════════════════════════════════
   SCENE TIMING
   1 page = 1 minute. Dialogue weighted at 0.85x (reads faster).
   Parentheticals at 0.75x. All other elements at 1x.
   ═══════════════════════════════════════════════════════════════ */

const LINES_PER_MIN = LINES_PER_PAGE;

function calcTokenMinutes(tok) {
  switch (tok.type) {
    case 'paren':    return tokenLineCount(tok) / LINES_PER_MIN * 0.75;
    case 'dialogue': return tokenLineCount(tok) / LINES_PER_MIN * 0.85;
    case 'lyric':    return tokenLineCount(tok) / LINES_PER_MIN * 0.90;
    default:         return tokenLineCount(tok) / LINES_PER_MIN;
  }
}

function minutesToDisplay(mins) {
  if (mins < 0.5) return '<1m';
  const totalSecs = Math.round(mins * 60);
  const m = Math.floor(totalSecs / 60);
  const s = totalSecs % 60;
  if (m === 0) return s + 's';
  if (s === 0) return m + 'm';
  return m + 'm ' + s + 's';
}

function minutesToClass(mins) {
  if (mins < 1) return 'short';
  if (mins < 3) return 'normal';
  if (mins < 5) return 'long';
  return 'vlong';
}

function calcSceneMinutes(tokens) {
  return tokens.reduce(function(sum, tok) { return sum + calcTokenMinutes(tok); }, 0);
}

function runtimeDisplay(totalMins) {
  if (totalMins < 1) return '~' + Math.round(totalMins * 60) + 's';
  var h = Math.floor(totalMins / 60);
  var m = Math.round(totalMins % 60);
  if (h === 0) return '~' + m + 'm';
  return '~' + h + 'h ' + m + 'm';
}

function buildSceneCards(text) {
  const parsed = parseFountain(text);
  const cards = [];
  let sceneIdx = 0;
  let currentScene = null;

  for (const tok of parsed.body) {
    if (tok.type === 'scene') {
      if (currentScene) {
        currentScene.mins = calcSceneMinutes(currentScene.tokens);
        cards.push(currentScene);
      }
      sceneIdx++;
      currentScene = { num: sceneIdx, heading: tok.text, action: '', chars: [], tokens: [tok] };
    } else if (currentScene) {
      currentScene.tokens.push(tok);
      if (tok.type === 'action' && !currentScene.action) {
        currentScene.action = tok.text.replace(/\n/g, ' ').slice(0, 120);
      }
      if (tok.type === 'character') {
        const name = tok.text.replace(/\^$/, '').replace(/\s*\(.+?\)\s*$/, '').trim();
        if (name && !currentScene.chars.includes(name)) currentScene.chars.push(name);
      }
    }
  }
  if (currentScene) {
    currentScene.mins = calcSceneMinutes(currentScene.tokens);
    cards.push(currentScene);
  }
  return cards;
}

function renderCards() {
  const cards = buildSceneCards(editor.value);
  const grid = document.getElementById('cardsGrid');
  const countEl = document.getElementById('cardsCount');
  const totalMins = cards.reduce((s, c) => s + (c.mins || 0), 0);
  countEl.innerHTML = `${cards.length} ${cards.length === 1 ? 'scene' : 'scenes'} &nbsp;<span class="cards-total-runtime">${runtimeDisplay(totalMins)}</span>`;

  if (cards.length === 0) {
    grid.innerHTML = '<div class="cards-empty">No scene headings yet.<br>Add INT. or EXT. lines to see cards here.</div>';
    return;
  }

  grid.innerHTML = '';
  cards.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'scene-card';
    el.draggable = true;
    el.dataset.idx = idx;
    const cardMins = card.mins || 0;
    const timingClass = minutesToClass(cardMins);
    const timingDisplay = minutesToDisplay(cardMins);
    const barPct = Math.min(100, (cardMins / 5) * 100).toFixed(1);
    el.innerHTML = `
      <div class="scene-card-num">Scene ${card.num}</div>
      <div class="scene-card-heading">${escapeHtml(card.heading)}</div>
      ${card.action ? `<div class="scene-card-action">${escapeHtml(card.action)}</div>` : ''}
      ${card.chars.length ? `<div class="scene-card-chars">${card.chars.slice(0,4).map(c => `<span class="scene-card-char">${escapeHtml(c)}</span>`).join('')}</div>` : ''}
      <div class="scene-card-timing">
        <div class="timing-bar"><div class="timing-bar-fill ${timingClass}" style="width:${barPct}%"></div></div>
        <span class="timing-label ${timingClass}">${timingDisplay}</span>
      </div>
    `;

    // Tap to jump to scene in editor
    el.addEventListener('click', (e) => {
      if (el.classList.contains('dragging')) return;
      jumpToScene(card.num);
    });

    // Touch drag-and-drop
    let touchDragIdx = null;
    let touchDropIdx = null;

    el.addEventListener('dragstart', (e) => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', idx);
      setTimeout(() => el.classList.add('dragging'), 10);
      touchDragIdx = idx;
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
    el.addEventListener('dragover', (e) => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', (e) => {
      e.preventDefault();
      el.classList.remove('drag-over');
      const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
      const toIdx = idx;
      if (fromIdx !== toIdx) reorderScenes(fromIdx, toIdx);
    });

    // Touch drag
    let touchStartY = 0;
    el.addEventListener('touchstart', (e) => {
      touchDragIdx = idx;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    el.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const y = e.touches[0].clientY;
      const els = [...grid.querySelectorAll('.scene-card')];
      els.forEach(c => c.classList.remove('drag-over'));
      const target = document.elementFromPoint(e.touches[0].clientX, y);
      const targetCard = target ? target.closest('.scene-card') : null;
      if (targetCard && targetCard !== el) {
        targetCard.classList.add('drag-over');
        touchDropIdx = parseInt(targetCard.dataset.idx);
      }
    }, { passive: false });
    el.addEventListener('touchend', () => {
      grid.querySelectorAll('.scene-card').forEach(c => c.classList.remove('drag-over'));
      if (touchDropIdx !== null && touchDropIdx !== touchDragIdx) {
        reorderScenes(touchDragIdx, touchDropIdx);
      }
      touchDropIdx = null;
    });

    grid.appendChild(el);
  });
}

function jumpToScene(sceneNum) {
  // Close cards overlay if open, switch to write tab
  closeCardsOverlay();
  document.querySelector('.tab[data-panel="editor-panel"]').click();
  const text = editor.value;
  const lines = text.split('\n');
  let count = 0;
  let pos = 0;
  for (let i = 0; i < lines.length; i++) {
    const trimmed = lines[i].trim();
    const prevBlank = i === 0 || lines[i-1].trim() === '';
    if ((prevBlank && SCENE_RE.test(trimmed)) || /^\.[^.]/.test(trimmed)) {
      count++;
      if (count === sceneNum) {
        pos = lines.slice(0, i).join('\n').length + (i > 0 ? 1 : 0);
        break;
      }
    }
  }
  setTimeout(() => {
    editor.focus();
    editor.selectionStart = editor.selectionEnd = pos;
    const linesBefore = editor.value.slice(0, pos).split('\n').length;
    const lh = parseFloat(getComputedStyle(editor).lineHeight) || 24;
    editor.scrollTop = Math.max(0, (linesBefore - 3) * lh);
    updateSmartBar();
  }, 50);
}

function reorderScenes(fromIdx, toIdx) {
  // Rebuild text with scenes reordered
  const text = editor.value;
  const lines = text.split('\n');

  // Find scene boundaries (array of {start, end} line indices)
  const parsed = parseFountain(text);
  // We need char positions of each scene heading in the original text
  const sceneBoundaries = []; // {startChar, endChar}
  let charPos = 0;
  const bodyStart = text.indexOf('\n\n') + 2; // skip title page

  // Re-scan lines to find scene start positions
  const sceneStartLines = [];
  for (let i = 0; i < lines.length; i++) {
    const trimmed = lines[i].trim();
    const prevBlank = i === 0 || lines[i-1].trim() === '';
    if ((prevBlank && SCENE_RE.test(trimmed)) || /^\.[^.]/.test(trimmed)) {
      sceneStartLines.push(i);
    }
  }

  if (sceneStartLines.length < 2) return;

  // Each scene runs from its start line to just before the next scene start
  const sceneTexts = sceneStartLines.map((startLine, i) => {
    const endLine = i < sceneStartLines.length - 1 ? sceneStartLines[i+1] - 1 : lines.length - 1;
    // Trim trailing blank lines but keep one
    let end = endLine;
    while (end > startLine && lines[end].trim() === '') end--;
    return lines.slice(startLine, end + 1).join('\n');
  });

  // Reorder
  const reordered = [...sceneTexts];
  const [moved] = reordered.splice(fromIdx, 1);
  reordered.splice(toIdx, 0, moved);

  // Reconstruct: keep everything before first scene, then reordered scenes
  const preSceneLines = lines.slice(0, sceneStartLines[0]);
  const preScene = preSceneLines.join('\n');
  const newBody = (preScene ? preScene + '\n\n' : '') + reordered.join('\n\n') + '\n';

  editor.value = newBody;
  afterEdit();
  refreshDictionary();
  // Re-render cards
  renderCards();
}

// Cards overlay open/close
function openCardsOverlay() {
  closeDrawer();
  renderCards();
  const overlay = document.getElementById('cardsOverlay');
  overlay.style.display = 'flex';
}
function closeCardsOverlay() {
  document.getElementById('cardsOverlay').style.display = 'none';
}

/* ═══════════════════════════════════════════════════════════════
   VOICE DICTATION
   ═══════════════════════════════════════════════════════════════ */

const voiceBtn = document.getElementById('voiceBtn');
const voiceStatus = document.getElementById('voiceStatus');
let recognition = null;
let isListening = false;

function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    voiceBtn.classList.add('unsupported');
    voiceBtn.title = 'Voice not supported in this browser';
    return null;
  }
  const r = new SpeechRecognition();
  r.continuous = false;
  r.interimResults = false;
  r.lang = 'en-US';

  r.onresult = (e) => {
    const transcript = e.results[0][0].transcript.trim();
    insertDictatedText(transcript);
  };
  r.onend = () => stopListening();
  r.onerror = (e) => {
    if (e.error !== 'no-speech') showToast('Mic: ' + e.error);
    stopListening();
  };
  return r;
}

function startListening() {
  if (!recognition) recognition = initRecognition();
  if (!recognition) return;
  try {
    recognition.start();
    isListening = true;
    voiceBtn.classList.add('listening');
    voiceStatus.classList.add('show');
  } catch(e) { /* already started */ }
}
function stopListening() {
  isListening = false;
  voiceBtn.classList.remove('listening');
  voiceStatus.classList.remove('show');
  try { if (recognition) recognition.stop(); } catch(e) {}
}

function insertDictatedText(transcript) {
  if (!transcript) return;
  const { before, currentLine, beforeOnLine } = getCurrentLineInfo();
  const ctx = detectContext(before, currentLine);

  let text = transcript;
  // Format based on context
  if (ctx === 'scene' || beforeOnLine.trim() === '') {
    // Check if it sounds like a scene heading
    if (/^(interior|exterior|int|ext)\b/i.test(text)) {
      text = text.toUpperCase()
        .replace(/^INTERIOR\b/, 'INT.')
        .replace(/^EXTERIOR\b/, 'EXT.');
    }
  } else if (ctx === 'character') {
    text = text.toUpperCase();
  }

  // Clean up common speech artifacts
  text = text
    .replace(/\bnew line\b/gi, '\n')
    .replace(/\bnew paragraph\b/gi, '\n\n')
    .replace(/\bperiod\b/gi, '.')
    .replace(/\bcomma\b/gi, ',')
    .replace(/\bquestion mark\b/gi, '?')
    .replace(/\bexclamation mark\b/gi, '!')
    .replace(/\bdash\b/gi, ' — ');

  const pos = editor.selectionStart;
  const val = editor.value;
  // If cursor at start of line and line is empty, just insert; otherwise add space
  const needsSpace = beforeOnLine.length > 0 && !beforeOnLine.endsWith(' ') && !beforeOnLine.endsWith('\n');
  const insertion = (needsSpace ? ' ' : '') + text;
  editor.value = val.slice(0, pos) + insertion + val.slice(pos);
  editor.selectionStart = editor.selectionEnd = pos + insertion.length;
  afterEdit();
  showToast('Inserted');
}

const DRAFTS_KEY = 'fountain-pen-drafts-v1';

function loadDrafts() {
  try { return JSON.parse(localStorage.getItem(DRAFTS_KEY)) || []; }
  catch { return []; }
}
function saveDraftsStore(drafts) {
  try { localStorage.setItem(DRAFTS_KEY, JSON.stringify(drafts)); } catch(e) {}
}

function saveDraft(name) {
  const drafts = loadDrafts();
  const now = new Date();
  const dateStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const parsed = parseFountain(editor.value);
  const pages = paginateTokens(parsed.body).length;
  const words = editor.value.trim() ? editor.value.trim().split(/\s+/).length : 0;
  drafts.unshift({ name, date: dateStr, text: editor.value, words, pages });
  // Keep max 20 drafts
  if (drafts.length > 20) drafts.splice(20);
  saveDraftsStore(drafts);
  return drafts;
}

function computeDiff(oldText, newText) {
  // Simple line-level diff
  const oldLines = oldText.split('\n');
  const newLines = newText.split('\n');
  const result = [];
  const maxLen = Math.max(oldLines.length, newLines.length);
  // LCS-lite: just show changed lines with ±10 line context
  let i = 0, j = 0;
  const oldSet = new Set(oldLines.map((l,idx) => l+'||'+idx));

  // Simple unified diff approach
  const changes = [];
  const m = oldLines.length, n = newLines.length;
  // Build edit script (greedy, not true LCS but good enough for display)
  let oi = 0, ni = 0;
  while (oi < m || ni < n) {
    if (oi < m && ni < n && oldLines[oi] === newLines[ni]) {
      changes.push({ type: 'same', text: oldLines[oi] });
      oi++; ni++;
    } else if (ni < n && (oi >= m || !oldLines.slice(oi, oi+3).includes(newLines[ni]))) {
      changes.push({ type: 'add', text: newLines[ni] });
      ni++;
    } else {
      changes.push({ type: 'del', text: oldLines[oi] });
      oi++;
    }
  }

  // Keep only changed lines ± 2 context lines
  const toShow = new Set();
  changes.forEach((c, i) => {
    if (c.type !== 'same') {
      for (let k = Math.max(0, i-2); k <= Math.min(changes.length-1, i+2); k++) toShow.add(k);
    }
  });

  let html = '';
  let skipping = false;
  changes.forEach((c, i) => {
    if (!toShow.has(i)) {
      if (!skipping) { html += `<span class="diff-same">…</span>`; skipping = true; }
      return;
    }
    skipping = false;
    const txt = escapeHtml(c.text || ' ');
    if (c.type === 'add') html += `<span class="diff-add">+ ${txt}</span>`;
    else if (c.type === 'del') html += `<span class="diff-del">- ${txt}</span>`;
    else html += `<span class="diff-same">  ${txt}</span>`;
  });
  return html || '<span class="diff-same">No differences found.</span>';
}

/* ═══════════════════════════════════════════════════════════════
   SHARE AS LINK
   Compresses screenplay text → base64url → appended to URL hash.
   The viewer is a read-only rendered preview loaded when the hash
   is detected on page load.
   ═══════════════════════════════════════════════════════════════ */

/* ── Compression using CompressionStream (supported in all modern browsers) ── */
async function compressText(text) {
  const enc = new TextEncoder();
  const input = enc.encode(text);
  const cs = new CompressionStream('deflate-raw');
  const writer = cs.writable.getWriter();
  writer.write(input);
  writer.close();
  const chunks = [];
  const reader = cs.readable.getReader();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const compressed = new Uint8Array(chunks.reduce((a, c) => a + c.length, 0));
  let offset = 0;
  for (const chunk of chunks) { compressed.set(chunk, offset); offset += chunk.length; }
  return compressed;
}

async function decompressBytes(bytes) {
  const ds = new DecompressionStream('deflate-raw');
  const writer = ds.writable.getWriter();
  writer.write(bytes);
  writer.close();
  const chunks = [];
  const reader = ds.readable.getReader();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const out = new Uint8Array(chunks.reduce((a, c) => a + c.length, 0));
  let offset = 0;
  for (const chunk of chunks) { out.set(chunk, offset); offset += chunk.length; }
  return new TextDecoder().decode(out);
}

function bytesToBase64url(bytes) {
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function base64urlToBytes(str) {
  const padded = str.replace(/-/g, '+').replace(/_/g, '/');
  const pad = padded.length % 4;
  const b64 = pad ? padded + '===='.slice(pad) : padded;
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

async function encodeShareUrl(text) {
  const compressed = await compressText(text);
  const b64 = bytesToBase64url(compressed);
  // Build URL: current page URL (without hash) + #s= + encoded text
  const base = window.location.href.split('#')[0];
  return base + '#s=' + b64;
}

async function decodeShareHash(hash) {
  if (!hash.startsWith('#s=')) return null;
  try {
    const b64 = hash.slice(3);
    const bytes = base64urlToBytes(b64);
    return await decompressBytes(bytes);
  } catch (e) {
    console.error('Share decode failed:', e);
    return null;
  }
}

async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
    } else {
      // Fallback for older browsers
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    return true;
  } catch(e) { return false; }
}
